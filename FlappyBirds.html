<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy Clone</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:#70c5ce;
}
canvas{
    display:block;
    margin:auto;
    background:linear-gradient(#70c5ce,#c0f0ff);
}
</style>
</head>
<body>

<canvas id="game" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let bird = {
    x: 100,
    y: 300,
    radius: 15,
    velocity: 0,
    gravity: 0.5,
    jump: -8
};

let pipes = [];
let score = 0;
let gameOver = false;

function createPipe() {
    let gap = 150;
    let topHeight = Math.random() * 250 + 50;

    pipes.push({
        x: canvas.width,
        top: topHeight,
        bottom: topHeight + gap,
        width: 60,
        counted: false
    });
}

setInterval(() => {
    if (!gameOver) createPipe();
}, 1800);

document.addEventListener("keydown", flap);
document.addEventListener("click", flap);

function flap() {
    if (gameOver) {
        location.reload();
        return;
    }
    bird.velocity = bird.jump;
}

function update() {
    if (gameOver) return;

    bird.velocity += bird.gravity;
    bird.y += bird.velocity;

    if (bird.y + bird.radius > canvas.height ||
        bird.y - bird.radius < 0) {
        gameOver = true;
    }

    for (let i = pipes.length - 1; i >= 0; i--) {
        let p = pipes[i];

        p.x -= 3;

        if (!p.counted && p.x + p.width < bird.x) {
            score++;
            p.counted = true;
        }

        if (
            bird.x + bird.radius > p.x &&
            bird.x - bird.radius < p.x + p.width &&
            (bird.y - bird.radius < p.top ||
             bird.y + bird.radius > p.bottom)
        ) {
            gameOver = true;
        }

        if (p.x + p.width < 0) {
            pipes.splice(i, 1);
        }
    }
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Ground
    ctx.fillStyle = "#ded895";
    ctx.fillRect(0,550,400,50);

    // Bird
    ctx.fillStyle = "yellow";
    ctx.beginPath();
    ctx.arc(bird.x,bird.y,bird.radius,0,Math.PI*2);
    ctx.fill();

    // Eye
    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(bird.x+5,bird.y-5,3,0,Math.PI*2);
    ctx.fill();

    // Pipes
    ctx.fillStyle = "green";
    pipes.forEach(p => {
        ctx.fillRect(p.x,0,p.width,p.top);
        ctx.fillRect(
            p.x,
            p.bottom,
            p.width,
            canvas.height - p.bottom
        );
    });

    // Score
    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.fillText(score, 180, 50);

    if (gameOver) {
        ctx.fillStyle = "black";
        ctx.font = "40px Arial";
        ctx.fillText("Game Over", 90, 250);

        ctx.font = "20px Arial";
        ctx.fillText(
            "Click or Press Space to Restart",
            40,
            300
        );
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
